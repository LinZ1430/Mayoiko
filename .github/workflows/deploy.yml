name: Deploy to COS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install coscmd
        run: pip install coscmd

      - name: Test connection
        run: |
          coscmd config \
            -a ${{ secrets.COS_SECRET_ID }} \
            -s ${{ secrets.COS_SECRET_KEY }} \
            -b ${{ secrets.COS_BUCKET }} \
            -r ${{ secrets.COS_REGION }}
          coscmd list
          echo "--- Connection OK ---"

      - name: Upload
        run: coscmd upload -r ./ /
